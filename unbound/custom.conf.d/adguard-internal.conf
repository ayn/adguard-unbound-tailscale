server:
    # Keep the process user unchanged so the container can update the persisted
    # RFC5011 trust anchor in ./unbound/var.
    username: ""

    # This resolver listens only inside the private Docker bridge network.
    interface: 0.0.0.0
    port: 53

    # Allow common private bridge subnets.  The container has no published
    # ports, so this remains private to Docker-attached peers.
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: fd00::/8 allow
